name: Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Restore lightweight inventory snapshot
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: collector-snapshot-v2-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            collector-snapshot-v2-${{ github.ref_name }}-

      - name: Sanitize lightweight inventory snapshot
        run: |
          mkdir -p .state
          if [ ! -f .state/inventory-snapshot.json ]; then
            exit 0
          fi
          node -e '
            const fs = require("node:fs");
            const file = ".state/inventory-snapshot.json";
            const raw = fs.readFileSync(file, "utf8");
            if (raw.trim() === "") {
              fs.writeFileSync(file, "[]\n", "utf8");
              process.exit(0);
            }
            try {
              const parsed = JSON.parse(raw);
              if (!Array.isArray(parsed)) {
                fs.writeFileSync(file, "[]\n", "utf8");
              }
            } catch {
              fs.writeFileSync(file, "[]\n", "utf8");
            }
          '

      - name: Run collector
        env:
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          ACCESS_SERVICE_TOKEN_ID: ${{ secrets.ACCESS_SERVICE_TOKEN_ID }}
          ACCESS_SERVICE_TOKEN_SECRET: ${{ secrets.ACCESS_SERVICE_TOKEN_SECRET }}
          BILLING_SHIELD_INGEST_URL: ${{ secrets.BILLING_SHIELD_INGEST_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run start

      - name: Save lightweight inventory snapshot
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: collector-snapshot-v2-${{ github.ref_name }}-${{ github.run_id }}
