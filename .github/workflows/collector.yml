name: Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Restore lightweight inventory snapshot
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: collector-snapshot-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            collector-snapshot-${{ github.ref_name }}-

      - name: Run collector
        env:
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          ACCESS_SERVICE_TOKEN_ID: ${{ secrets.ACCESS_SERVICE_TOKEN_ID }}
          ACCESS_SERVICE_TOKEN_SECRET: ${{ secrets.ACCESS_SERVICE_TOKEN_SECRET }}
          BILLING_SHIELD_INGEST_URL: ${{ secrets.BILLING_SHIELD_INGEST_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run start

      - name: Save lightweight inventory snapshot
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: collector-snapshot-${{ github.ref_name }}-${{ github.run_id }}
